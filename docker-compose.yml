services:
  web:
    build: .
    env_file: .env
    command: ./entrypoint.sh
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synexdb}
      POSTGRES_USER: ${POSTGRES_USER:-synexuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synexpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
  backup:
    image: postgres:16-alpine
    env_file: .env
    entrypoint: >
      sh -c "while true; do
        echo \"[backup] iniciando dump...\";
        PGPASSWORD=$${POSTGRES_PASSWORD} pg_dump -h $${POSTGRES_HOST:-db} -U $${POSTGRES_USER} $${POSTGRES_DB} > /backups/backup_$$(date +%Y%m%d%H%M).sql &&
        find /backups -type f -mtime +7 -delete;
        sleep 86400;
      done"
    volumes:
      - pgbackups:/backups
    depends_on:
      - db
  pgadmin:
    image: dpage/pgadmin4:8.13
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@synex.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-changeme123}
    ports:
      - "5051:80"
    depends_on:
      - db

volumes:
  pgdata:
  pgbackups:
