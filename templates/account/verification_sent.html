<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synex Flow — Verifique seu e-mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% load static %}
    <link rel="manifest" href="{% static 'core/manifest.json' %}">
    <link rel="icon" href="{% static 'core/icons/icon.svg' %}">
    <meta name="theme-color" content="#0284c7">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(14,165,233,0.25), transparent 25%),
                        radial-gradient(circle at 80% 0%, rgba(16,185,129,0.18), transparent 25%),
                        linear-gradient(135deg, #0b1224 0%, #0f172a 45%, #0b1224 100%);
        }
        .glass {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
        }
    </style>
</head>
<body class="min-h-screen gradient-bg text-slate-100">
    <div class="max-w-3xl mx-auto px-6 py-14">
        <header class="flex items-center gap-3 mb-10">
            <div class="w-11 h-11 rounded-2xl bg-primary-500 text-white font-semibold text-lg flex items-center justify-center shadow-lg shadow-primary-500/30">S</div>
            <div>
                <p class="text-sm text-slate-400">Synex Study Flow</p>
                <h1 class="text-2xl font-bold text-slate-50 tracking-tight">Confirme seu e-mail</h1>
            </div>
        </header>

        <div class="glass rounded-3xl p-8 lg:p-10 space-y-4">
            <p class="text-slate-200 text-lg">
                Enviamos um e-mail com o link de confirmação.
            </p>
            <p class="text-slate-400">
                Abra sua caixa de entrada e clique no botão de confirmação para ativar sua conta.
            </p>
            <a href="{% url 'login' %}" class="inline-flex items-center justify-center w-full py-3 rounded-xl bg-white/5 border border-white/10 text-slate-100 font-semibold hover:bg-white/10 transition">
                Ir para o login
            </a>
        </div>
    </div>
</body>
</html>
