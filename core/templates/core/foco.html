{% extends 'core/base.html' %}

{% block content %}
<div class="h-full flex flex-col items-center justify-center -mt-10">
    
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Modo Foco</h1>
        <p class="text-gray-500">Escolha uma tarefa, elimine distrações e comece.</p>
    </div>

    <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 w-full max-w-lg text-center relative overflow-hidden">
        
        <div class="absolute top-0 left-0 h-1.5 bg-indigo-100 w-full">
            <div id="progress-bar" class="h-full bg-indigo-600 w-0 transition-all duration-1000"></div>
        </div>

        <div class="flex justify-center gap-2 mb-8 bg-gray-100 p-1 rounded-xl inline-flex mx-auto">
            <button onclick="setMode('pomodoro')" id="btn-pomodoro" class="px-4 py-2 rounded-lg text-sm font-bold bg-white text-indigo-600 shadow-sm transition">Pomodoro (25m)</button>
            <button onclick="setMode('short')" id="btn-short" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition">Curto (5m)</button>
            <button onclick="setMode('long')" id="btn-long" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition">Longo (15m)</button>
        </div>

        <div class="text-[8rem] font-bold text-gray-800 leading-none tracking-tight font-mono mb-8 select-none" id="timer-display">
            25:00
        </div>

        <div class="flex justify-center gap-4">
            <button onclick="toggleTimer()" id="btn-action" class="w-32 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-lg shadow-lg transform active:scale-95 transition flex items-center justify-center">
                <i class="fa-solid fa-play mr-2" id="icon-action"></i> <span id="text-action">Iniciar</span>
            </button>
            
            <button onclick="resetTimer()" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl transition">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>

        <p class="mt-6 text-sm text-gray-400 font-medium" id="status-text">Pronto para focar?</p>
        <div class="mt-6 rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-xs text-gray-600">
            Para salvar essa sessão e vincular a uma tarefa, registre no dashboard.
            <a href="{% url 'dashboard' %}#sessao-form" class="text-indigo-600 font-semibold hover:text-indigo-500">Registrar agora</a>
        </div>
    </div>

</div>

<script>
    let timeLeft = 25 * 60; // 25 minutos em segundos
    let initialTime = 25 * 60;
    let timerId = null;
    let isRunning = false;
    let currentMode = 'pomodoro';

    const display = document.getElementById('timer-display');
    const btnAction = document.getElementById('btn-action');
    const textAction = document.getElementById('text-action');
    const iconAction = document.getElementById('icon-action');
    const progressBar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');

    // Formata segundos em MM:SS
    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // Atualiza a tela
    function updateDisplay() {
        display.textContent = formatTime(timeLeft);
        const progress = ((initialTime - timeLeft) / initialTime) * 100;
        progressBar.style.width = `${progress}%`;
        document.title = `${formatTime(timeLeft)} - Foco`; // Mostra tempo na aba do navegador
    }

    // Alterna Iniciar/Pausar
    function toggleTimer() {
        if (isRunning) {
            pauseTimer();
        } else {
            startTimer();
        }
    }

    function startTimer() {
        isRunning = true;
        textAction.textContent = "Pausar";
        iconAction.className = "fa-solid fa-pause mr-2";
        btnAction.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
        btnAction.classList.add('bg-amber-500', 'hover:bg-amber-600');
        statusText.textContent = "Mantenha o foco...";
        
        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay();
            
            if (timeLeft <= 0) {
                finishTimer();
            }
        }, 1000);
    }

    function pauseTimer() {
        isRunning = false;
        clearInterval(timerId);
        textAction.textContent = "Continuar";
        iconAction.className = "fa-solid fa-play mr-2";
        btnAction.classList.remove('bg-amber-500', 'hover:bg-amber-600');
        btnAction.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
        statusText.textContent = "Pausado";
    }

    function resetTimer() {
        pauseTimer();
        if(currentMode === 'pomodoro') timeLeft = 25 * 60;
        else if(currentMode === 'short') timeLeft = 5 * 60;
        else timeLeft = 15 * 60;
        
        initialTime = timeLeft;
        textAction.textContent = "Iniciar";
        statusText.textContent = "Pronto para recomeçar?";
        updateDisplay();
    }

    function finishTimer() {
        pauseTimer();
        timeLeft = 0;
        updateDisplay();
        statusText.textContent = "Tempo esgotado! Bom trabalho.";
        
        // Toca um som simples de notificação (pode ser bloqueado pelo navegador se não houver interação antes)
        const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        audio.play();
        alert("Tempo Esgotado!");
    }

    // Troca os modos (Pomodoro, Curto, Longo)
    function setMode(mode) {
        currentMode = mode;
        resetTimer();
        
        // Reseta estilos dos botões de topo
        document.querySelectorAll('[id^="btn-"]').forEach(btn => {
             // Lógica visual simples para alternar classes (pode ser refinada)
             if(btn.id === `btn-${mode}`) {
                 btn.className = "px-4 py-2 rounded-lg text-sm font-bold bg-white text-indigo-600 shadow-sm transition";
             } else if (!btn.id.includes('action')) {
                 btn.className = "px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700 transition";
             }
        });
    }

    // Inicializa
    updateDisplay();
</script>
{% endblock %}
