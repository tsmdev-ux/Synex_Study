<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synex | Manutencao</title>
    <style>
        :root {
            --bg: #0b1224;
            --card: rgba(15, 23, 42, 0.7);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.12), transparent 40%),
                radial-gradient(circle at 80% 0%, rgba(168, 85, 247, 0.12), transparent 35%),
                var(--bg);
            color: var(--text);
            font-family: "Manrope", system-ui, -apple-system, sans-serif;
        }
        .card {
            width: min(680px, 92vw);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            padding: 32px;
            background: var(--card);
            box-shadow: 0 30px 80px rgba(2, 6, 23, 0.6);
        }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .brand-mark {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: linear-gradient(135deg, #38bdf8, #a855f7);
            color: #0b1224;
            font-weight: 800;
        }
        h1 {
            margin: 8px 0 12px;
            font-size: 2rem;
        }
        p {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.6;
        }
        .timer {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .timer-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .timer-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
        }
        .timer-label {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .end-at {
            margin-top: 14px;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: var(--accent);
            font-weight: 600;
            font-size: 0.8rem;
        }
        @media (max-width: 560px) {
            .timer { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-mark">S</div>
            <div>
                <div class="pill">Modo manutencao</div>
            </div>
        </div>
        <h1>Estamos em manutencao</h1>
        <p>{{ maintenance_message }}</p>
        <div id="timer" class="timer" data-end-at="{{ maintenance_end_at|default:'' }}"></div>
        <div id="end-at" class="end-at"></div>
    </div>

    <script>
        (function () {
            const timer = document.getElementById('timer');
            const endAtRaw = timer.getAttribute('data-end-at');
            const endAtEl = document.getElementById('end-at');
            if (!endAtRaw) {
                endAtEl.textContent = 'Voltamos em breve.';
                timer.innerHTML = '';
                return;
            }

            const endAt = new Date(endAtRaw.replace(' ', 'T'));
            if (Number.isNaN(endAt.getTime())) {
                endAtEl.textContent = 'Voltamos em breve.';
                timer.innerHTML = '';
                return;
            }

            endAtEl.textContent = 'Previsao de retorno: ' + endAt.toLocaleString('pt-BR');

            const labels = ['Dias', 'Horas', 'Minutos', 'Segundos'];
            function render(values) {
                timer.innerHTML = values.map((value, idx) => (
                    '<div class="timer-box">' +
                    '<div class="timer-value">' + value + '</div>' +
                    '<div class="timer-label">' + labels[idx] + '</div>' +
                    '</div>'
                )).join('');
            }

            function tick() {
                const now = new Date();
                let diff = Math.max(0, endAt.getTime() - now.getTime());
                const days = Math.floor(diff / 86400000);
                diff -= days * 86400000;
                const hours = Math.floor(diff / 3600000);
                diff -= hours * 3600000;
                const minutes = Math.floor(diff / 60000);
                diff -= minutes * 60000;
                const seconds = Math.floor(diff / 1000);
                render([days, hours, minutes, seconds].map((v) => String(v).padStart(2, '0')));
                if (endAt.getTime() - now.getTime() <= 0) {
                    endAtEl.textContent = 'Voltamos em breve.';
                }
            }

            tick();
            setInterval(tick, 1000);
        })();
    </script>
</body>
</html>
