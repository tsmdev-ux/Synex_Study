﻿{% extends 'core/base.html' %}

{% block content %}
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
<style>
    .fc {
        --fc-bg: #f8fafc;
        --fc-border: #e5e7eb;
        --fc-today-bg: #eefcf6;
        --fc-soft: #f1f5f9;
    }
    .fc .fc-scrollgrid {
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid var(--fc-border);
    }
    .fc .fc-toolbar.fc-header-toolbar {
        margin-bottom: 1.2rem;
        background: linear-gradient(135deg, #f8fafc, #ffffff);
        padding: 0.75rem 1rem;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    .fc-toolbar-title {
        font-size: 1.15rem !important;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.02em;
    }
    .fc-button {
        border-radius: 999px !important;
        font-weight: 700 !important;
        padding: 0.35rem 0.85rem !important;
        border: 1px solid #e2e8f0 !important;
        background: #ffffff !important;
        color: #0f172a !important;
        box-shadow: none !important;
    }
    .fc-button-primary {
        background: #0ea5e9 !important;
        border-color: #0ea5e9 !important;
        color: #ffffff !important;
    }
    .fc-button-primary:hover { background: #0284c7 !important; border-color: #0284c7 !important; }
    .fc-button:focus { box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2) !important; }
    .fc-daygrid-day-frame, .fc-timegrid-slot { background: #ffffff; }
    .fc-daygrid-day-number { font-weight: 600; color: #475569; }
    .fc-day-today { background-color: var(--fc-today-bg) !important; }
    .fc-col-header-cell, .fc-scrollgrid, .fc-scrollgrid td { border-color: #e5e7eb !important; }
    .fc-event {
        cursor: pointer;
        border-radius: 12px !important;
        padding: 6px 10px !important;
        font-weight: 600;
        letter-spacing: -0.01em;
        background: #f8fafc;
        color: #0f172a;
        border: 1px solid rgba(148, 163, 184, 0.35) !important;
        box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
    }
    .fc-event-title { font-size: 0.85rem; }
    .fc-event-time { font-weight: 700; }
    .study-event {
        background-color: #ffffff !important;
        border: 1px solid #e5e7eb !important;
        color: #111827 !important;
        box-shadow: none !important;
        padding: 3px 6px !important;
        font-size: 0.75rem !important;
    }
    .fc-card-custom { display: flex; flex-direction: column; gap: 6px; width: 100%; overflow: hidden; }
    .fc-card-title { font-size: 0.82rem; font-weight: 700; color: #0f172a; line-height: 1.2; word-break: break-word; }
    .fc-card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: #4b5563; gap: 6px; flex-wrap: wrap; }
    .fc-badge { padding: 2px 6px; border-radius: 999px; font-weight: 700; font-size: 0.65rem; color: #0f172a; background: #e5e7eb; white-space: nowrap; }
    .fc-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 700;
        background: rgba(15, 23, 42, 0.04);
        border: 1px solid rgba(148, 163, 184, 0.35);
        color: #0f172a;
    }
    .fc-pill-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #0ea5e9;
    }

    /* Dark mode overrides */
    .dark .fc {
        --fc-bg: #0b1224;
        --fc-border: #1f2937;
        --fc-today-bg: #1b2536;
        --fc-soft: #0f172a;
    }
    .dark .fc .fc-scrollgrid,
    .dark .fc .fc-scrollgrid td,
    .dark .fc .fc-scrollgrid th {
        border-color: #1f2937 !important;
    }
    .dark .fc .fc-toolbar.fc-header-toolbar {
        background: linear-gradient(135deg, #0b1224, #111827);
        border-color: #1f2937;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.5);
    }
    .dark .fc-toolbar-title { color: #e5e7eb; }
    .dark .fc-button {
        background: #0f172a !important;
        border-color: #1f2937 !important;
        color: #e5e7eb !important;
    }
    .dark .fc-button-primary {
        background-color: #0ea5e9 !important;
        border-color: #0ea5e9 !important;
        color: #e5e7eb !important;
    }
    .dark .fc-daygrid-day-frame,
    .dark .fc-timegrid-slot {
        background: #0f172a;
    }
    .dark .fc-daygrid-day-number { color: #94a3b8; }
    .dark .fc-day-today { background-color: var(--fc-today-bg) !important; }
    .dark .fc-col-header-cell { background: #0b1224; color: #e5e7eb; }
    .dark .fc-event {
        background: #111827;
        color: #e5e7eb;
        border-color: #1f2937 !important;
        box-shadow: 0 8px 16px rgba(2, 6, 23, 0.45);
    }
    .dark .fc-card-title { color: #e5e7eb; }
    .dark .fc-card-meta { color: #9ca3af; }
    .dark .fc-badge { background: #0f172a; color: #e5e7eb; border: 1px solid #1f2937; }
    .dark .fc-pill {
        background: rgba(148, 163, 184, 0.08);
        border-color: #1f2937;
        color: #e5e7eb;
    }

    .schedule-grid {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        height: 100%;
    }
    .schedule-panel {
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        background: #ffffff;
        padding: 1.25rem;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }
    .dark .schedule-panel {
        border-color: #1f2937;
        background: #0f172a;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.5);
    }
    .schedule-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
    }
    .schedule-title {
        font-size: 0.95rem;
        font-weight: 800;
        color: #0f172a;
    }
    .dark .schedule-title { color: #e5e7eb; }
    .schedule-sub {
        font-size: 0.75rem;
        color: #64748b;
    }
    .dark .schedule-sub { color: #94a3b8; }
    .agenda-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-height: 420px;
        overflow-y: auto;
    }
    .agenda-card {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 0.85rem 1rem;
        border-radius: 14px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
    }
    .dark .agenda-card {
        border-color: #1f2937;
        background: #111827;
    }
    .agenda-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        margin-top: 6px;
        background: #0ea5e9;
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
    }
    .agenda-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: #0f172a;
        line-height: 1.3;
        margin-bottom: 0.35rem;
    }
    .dark .agenda-title { color: #e5e7eb; }
    .agenda-meta {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
    }
    .agenda-chip {
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.16);
        border: 1px solid rgba(148, 163, 184, 0.35);
        color: #475569;
    }
    .dark .agenda-chip {
        background: rgba(148, 163, 184, 0.08);
        border-color: #1f2937;
        color: #cbd5f5;
    }
    .dark .agenda-meta { color: #94a3b8; }
    .agenda-list {
        max-height: 220px;
    }
</style>

<div class="max-w-7xl mx-auto h-full flex flex-col">
    <div class="relative z-10 overflow-hidden rounded-3xl mb-10 border border-primary-100 dark:border-primary-900 bg-gradient-to-r from-primary-50 via-white to-emerald-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 min-h-[170px]">
        <div class="absolute inset-0 opacity-30 blur-3xl bg-gradient-to-r from-primary-400 to-emerald-400"></div>
        <div class="relative px-8 pt-10 pb-10 flex flex-col md:flex-row md:items-center md:justify-between gap-6">
            <div>
                <p class="text-xs uppercase tracking-[0.2em] text-primary-500 font-semibold">Agenda inteligente</p>
                <h1 class="text-3xl font-bold text-gray-900 dark:text-gray-50 mt-3 leading-tight">Cronograma de Estudos</h1>
                <p class="text-gray-600 dark:text-gray-300 mt-2">Arraste, solte e veja tudo o que precisa fazer sem sair do painel.</p>
            </div>
            <div class="flex flex-wrap gap-2 text-xs font-semibold text-gray-600 dark:text-gray-300">
                <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-white/70 dark:bg-slate-800/70 border border-gray-200 dark:border-gray-700">
                    <span class="w-2 h-2 rounded-full bg-sky-500"></span> A Fazer
                </span>
                <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-white/70 dark:bg-slate-800/70 border border-gray-200 dark:border-gray-700">
                    <span class="w-2 h-2 rounded-full bg-primary-500"></span> Em Andamento
                </span>
                <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-white/70 dark:bg-slate-800/70 border border-gray-200 dark:border-gray-700">
                    <span class="w-2 h-2 rounded-full bg-orange-400"></span> Revisão
                </span>
                <span class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-white/70 dark:bg-slate-800/70 border border-gray-200 dark:border-gray-700">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Concluída
                </span>
            </div>
        </div>
    </div>

    <div class="schedule-grid">
        <div class="schedule-panel">
            <div class="schedule-header">
                <div>
                    <div class="schedule-title">Agenda do dia</div>
                    <div id="agenda-date" class="schedule-sub">Selecionado: hoje</div>
                </div>
                <button id="agenda-today" type="button" class="px-3 py-1.5 text-xs font-semibold rounded-full bg-primary-600 hover:bg-primary-500 text-white transition">Hoje</button>
            </div>
            <div id="agenda-list" class="agenda-list">
                <div class="text-sm text-gray-500 dark:text-gray-400">Selecione um dia para ver as tarefas.</div>
            </div>
        </div>
        <div class="bg-white dark:bg-dark-card p-6 rounded-2xl shadow-lg border border-gray-200 dark:border-dark-border flex-1 min-h-[600px]">
            <div id='calendar' class="h-full"></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');

        var selectedDate = new Date().toISOString().slice(0, 10);

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: window.innerWidth < 768 ? 'dayGridMonth' : 'timeGridWeek',
            locale: 'pt-br',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: window.innerWidth < 768 ? 'listWeek,dayGridMonth' : 'dayGridMonth,timeGridWeek,listWeek'
            },
            buttonText: {
                today: 'Hoje',
                month: 'Mês',
                week: 'Semana',
                list: 'Lista'
            },
            slotMinTime: '06:00:00',
            slotMaxTime: '22:00:00',
            slotDuration: '00:30:00',
            editable: true,
            droppable: true,
            events: "{% url 'api_calendar' %}",
            eventContent: function(info) {
                const statusLabelMap = {
                    'todo': 'A Fazer',
                    'doing': 'Em Andamento',
                    'review': 'Revisão',
                    'done': 'Concluída'
                };
                const status = info.event.extendedProps.status;
                const materia = info.event.extendedProps.materia || '';
                const materiaCor = info.event.extendedProps.materia_cor || '#0ea5e9';
                const colorMap = {
                    'todo': '#0ea5e9',
                    'doing': '#0284c7',
                    'review': '#fb923c',
                    'done': '#22c55e'
                };
                const isDark = document.documentElement.classList.contains('dark');
                const badgeColor = colorMap[status] || '#9ca3af';
                const badgeText = isDark ? '#e5e7eb' : '#0f172a';
                const badge = status ? `<span class="fc-badge" style="background:${badgeColor}1a;border:1px solid ${badgeColor}33;color:${badgeText};">${statusLabelMap[status] || status}</span>` : '';
                const durationMin = info.event.extendedProps.duration_min;
                const hasDuration = durationMin !== undefined && durationMin !== null;
                const duration = hasDuration
                    ? (() => {
                        const minutes = Number(durationMin) || 0;
                        if (minutes >= 60) {
                            const h = Math.floor(minutes / 60);
                            const m = minutes % 60;
                            return m ? `${h}h ${m}min` : `${h}h`;
                        }
                        return `${minutes} min`;
                    })()
                    : (info.timeText || 'Sem horário');

                const materiaPill = materia ? `
                    <span class="fc-pill" style="border-color:${materiaCor}55;">
                        <span class="fc-pill-dot" style="background:${materiaCor};"></span>
                        ${materia}
                    </span>
                ` : '';

                const wrapper = document.createElement('div');
                wrapper.className = 'fc-card-custom';
                wrapper.innerHTML = `
                    <div class="fc-card-title">${info.event.title}</div>
                    <div class="fc-card-meta">
                        <span>${duration}</span>
                        ${badge}
                    </div>
                    ${materiaPill}
                `;
                return { domNodes: [wrapper] };
            },
            eventDidMount: function(info) {
                const status = info.event.extendedProps.status;
                if (!status) return;
                const colorMap = {
                    'todo': '#0ea5e9',
                    'doing': '#0284c7',
                    'review': '#fb923c',
                    'done': '#22c55e'
                };
                const isDark = document.documentElement.classList.contains('dark');
                const color = colorMap[status] || '#9ca3af';
                info.el.style.backgroundColor = isDark ? (color + '26') : (color + '1a');
                info.el.style.borderColor = isDark ? (color + '66') : (color + '55');
                info.el.style.color = isDark ? '#e5e7eb' : '#0f172a';
            },
            dateClick: function(info) {
                selectedDate = info.dateStr;
                updateAgenda(selectedDate);
            },
            eventDrop: function(info) {
                var newDate = info.event.start.toISOString().split('T')[0];

                fetch("{% url 'api_calendar' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        id: info.event.id,
                        data: newDate
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.success) {
                        alert('Erro ao mover tarefa!');
                        info.revert();
                    }
                });
            },
            eventMouseEnter: function(info) {
                const statusLabelMap = {
                    'todo': 'A Fazer',
                    'doing': 'Em Andamento',
                    'review': 'Revisão',
                    'done': 'Concluída'
                };
                const statusLabel = statusLabelMap[info.event.extendedProps.status] || 'Sem status';
                const durationMin = info.event.extendedProps.duration_min;
                const durationText = durationMin ? `${durationMin} min estudados` : 'Sem tempo registrado';
                info.el.title = `${info.event.title}\n${statusLabel} - ${durationText}`;
            }
        });

        calendar.render();

        var agendaListEl = document.getElementById('agenda-list');
        var agendaDateEl = document.getElementById('agenda-date');
        var agendaTodayBtn = document.getElementById('agenda-today');

        function formatAgendaDate(dateStr) {
            const dateObj = new Date(dateStr + 'T00:00:00');
            return dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        }

        function buildAgenda(items) {
            if (!agendaListEl) return;
            agendaListEl.innerHTML = '';
            if (!items.length) {
                agendaListEl.innerHTML = '<div class="text-sm text-gray-500 dark:text-gray-400">Nenhuma tarefa para este dia.</div>';
                return;
            }
            items.forEach(function (evt) {
                const status = evt.extendedProps.status;
                const colorMap = {
                    'todo': '#0ea5e9',
                    'doing': '#0284c7',
                    'review': '#fb923c',
                    'done': '#22c55e'
                };
                const color = colorMap[status] || '#94a3b8';
                const materia = evt.extendedProps.materia || 'Sem matéria';
                const durationMin = evt.extendedProps.duration_min || 0;
                const duration = durationMin ? `${durationMin} min` : 'Sem tempo';
                const start = evt.start ? evt.start.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : 'Sem horário';

                const card = document.createElement('div');
                card.className = 'agenda-card';
                card.innerHTML = `
                    <div class="agenda-dot" style="background:${color}; box-shadow: 0 0 0 4px ${color}22;"></div>
                    <div>
                        <div class="agenda-title">${evt.title}</div>
                        <div class="agenda-meta">
                            <span class="agenda-chip">${start}</span>
                            <span class="agenda-chip">${duration}</span>
                            <span class="agenda-chip">${materia}</span>
                        </div>
                    </div>
                `;
                agendaListEl.appendChild(card);
            });
        }

        function updateAgenda(dateStr) {
            if (!dateStr) return;
            if (agendaDateEl) {
                agendaDateEl.textContent = 'Selecionado: ' + formatAgendaDate(dateStr);
            }
            const items = calendar.getEvents().filter(function (evt) {
                if (!evt.start) return false;
                const d = evt.start.toISOString().slice(0, 10);
                return d === dateStr;
            });
            buildAgenda(items);
        }

        calendar.on('datesSet', function () {
            updateAgenda(selectedDate);
        });
        calendar.on('eventsSet', function () {
            updateAgenda(selectedDate);
        });

        if (agendaTodayBtn) {
            agendaTodayBtn.addEventListener('click', function () {
                calendar.today();
                selectedDate = new Date().toISOString().slice(0, 10);
                updateAgenda(selectedDate);
            });
        }

        updateAgenda(selectedDate);
    });
</script>
{% endblock %}
