<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha alterada â€” Synex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(99,102,241,0.25), transparent 25%),
                        radial-gradient(circle at 80% 0%, rgba(16,185,129,0.18), transparent 25%),
                        linear-gradient(135deg, #0b1224 0%, #0f172a 45%, #0b1224 100%);
        }
        .glass {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 60px rgba(0,0,0,0.45);
        }
    </style>
</head>
<body class="min-h-screen gradient-bg text-slate-100">
    <div class="max-w-3xl mx-auto px-6 py-12">
        <div class="glass rounded-3xl p-8 lg:p-10 text-center space-y-4">
            <div class="flex justify-center">
                <div class="w-14 h-14 rounded-2xl bg-emerald-500/20 text-emerald-200 flex items-center justify-center text-2xl shadow-lg shadow-emerald-500/30">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-slate-50">Senha atualizada</h1>
            <p class="text-slate-300">
                Sua senha foi redefinida com sucesso. Você já pode acessar com as novas credenciais.
            </p>
            <a href="{% url 'login' %}" class="inline-flex items-center justify-center px-5 py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white font-semibold shadow-lg shadow-indigo-500/30 transition">
                Ir para login
            </a>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
</body>
</html>
